{{#> base title="Order Confirmation" }}
<section class="section" style="min-height: 80vh; display: flex; align-items: center; justify-content: center; background: var(--color-surface-2);">
  <div class="container" style="max-width: 600px;">
    
    <div style="background: var(--color-surface); padding: var(--sp-10); border-radius: var(--r-xl); text-align: center; border: 1px solid var(--color-border); box-shadow: 0 10px 40px rgba(0,0,0,0.03);">
      
      <div style="width: 80px; height: 80px; background: #E6F4EA; color: #1E8E3E; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 2.5rem; margin: 0 auto var(--sp-6);">
        ✓
      </div>
      
      <h1 style="font-family: var(--font-display); font-size: 2.5rem; margin-bottom: var(--sp-2);">Order Confirmed!</h1>
      <p style="font-size: 1.1rem; color: var(--color-text-2); margin-bottom: var(--sp-6);">Thank you for your purchase. Your order has been received and is currently being processed.</p>
      
      <div style="background: var(--color-surface-2); border-radius: var(--r-lg); padding: var(--sp-6); margin-bottom: var(--sp-8); text-align: left;">
        <div style="display: flex; justify-content: space-between; margin-bottom: var(--sp-3);">
          <span style="color: var(--color-text-2);">Order Number:</span>
          <span style="font-weight: 700; font-family: var(--font-mono);">#8924</span>
        </div>
        <div style="display: flex; justify-content: space-between; margin-bottom: var(--sp-3);">
          <span style="color: var(--color-text-2);">Date:</span>
          <span style="font-weight: 600;">October 24, 2026</span>
        </div>
        <div style="display: flex; justify-content: space-between; margin-bottom: var(--sp-3);">
          <span style="color: var(--color-text-2);">Total Paid:</span>
          <span style="font-weight: 700; font-family: var(--font-mono);">$209.98</span>
        </div>
        <div style="display: flex; justify-content: space-between;">
          <span style="color: var(--color-text-2);">Email Receipt:</span>
          <span style="font-weight: 600;">you@example.com</span>
        </div>
      </div>

      <div style="display: flex; gap: var(--sp-4); justify-content: center;">
        <a href="/pages/account/orders.html" class="btn btn--outline btn--lg">View Order Status</a>
        <a href="/" class="btn btn--primary btn--lg">Continue Shopping</a>
      </div>

    </div>

  </div>
</section>
{{/base}}
