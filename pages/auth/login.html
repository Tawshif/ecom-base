{{#> base title="Log In" }}
<section class="auth-layout">
  <div class="auth-card">
    <h1 class="auth-card__title">Welcome Back</h1>
    <p class="auth-card__subtitle">Sign in to your account to continue</p>
    
    <div class="form-group">
      <label class="form-label">Email Address</label>
      <input type="email" class="form-input" placeholder="you@example.com">
    </div>
    
    <div class="form-group">
      <div style="display: flex; justify-content: space-between; align-items: center;">
        <label class="form-label">Password</label>
        <a href="/pages/auth/forgot-password.html" style="font-size: 0.8rem; color: var(--color-text-2); text-decoration: underline;">Forgot password?</a>
      </div>
      <input type="password" class="form-input" placeholder="••••••••">
    </div>
    
    <button class="btn btn--primary btn--full btn--lg" style="margin-top: var(--sp-4);" onclick="window.location.href='/pages/account/dashboard.html'">Log In</button>
    
    <div class="auth-divider">or log in with</div>
    
    <div style="display: flex; gap: var(--sp-3);">
      <button class="btn btn--outline btn--full" style="display: flex; gap: 8px; justify-content: center;">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none"><path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/><path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/><path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/><path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/></svg>
        Google
      </button>
      <button class="btn btn--outline btn--full" style="display: flex; gap: 8px; justify-content: center;">
        <svg width="18" height="18" viewBox="0 0 384 512" fill="currentColor"><path d="M318.7 268.7c-.2-36.7 16.4-64.4 50-84.8-18.8-26.9-47.2-41.7-84.7-44.6-35.5-2.8-74.3 20.7-88.5 20.7-15 0-49.4-19.7-76.4-19.7C63.3 141.2 4 184.8 4 273.5q0 39.3 14.4 81.2c12.8 36.7 59 126.7 107.2 125.2 25.2-.6 43-17.9 75.8-17.9 31.8 0 48.3 17.9 76.4 17.9 48.6-.7 90.4-82.5 102.6-119.3-65.2-30.7-61.7-90-61.7-91.9zm-56.6-164.2c27.3-32.4 24.8-61.9 24-72.5-24.1 1.4-52 16.4-67.9 34.9-17.5 19.8-27.8 44.3-25.6 71.9 26.1 2 49.9-11.4 69.5-34.3z"/></svg>
        Apple
      </button>
    </div>
    
    <div class="auth-footer">
      Don't have an account? <a href="/pages/auth/signup.html">Sign Up</a>
    </div>
  </div>
</section>
{{/base}}
