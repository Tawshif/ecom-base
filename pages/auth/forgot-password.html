{{#> base title="Forgot Password" }}
<section class="auth-layout">
  <div class="auth-card">
    <h1 class="auth-card__title">Reset Password</h1>
    <p class="auth-card__subtitle">Enter your email and we'll send you a link to reset your password.</p>
    
    <div class="form-group">
      <label class="form-label">Email Address</label>
      <input type="email" class="form-input" placeholder="you@example.com">
    </div>
    
    <button class="btn btn--primary btn--full btn--lg" style="margin-top: var(--sp-4);" onclick="window.location.href='/pages/auth/reset-password.html'">Send Reset Link</button>
    
    <div class="auth-footer">
      Remembered your password? <a href="/pages/auth/login.html">Back to Login</a>
    </div>
  </div>
</section>
{{/base}}
