{{#> base title="Sign Up" }}
<section class="auth-layout">
  <div class="auth-card">
    <h1 class="auth-card__title">Create Account</h1>
    <p class="auth-card__subtitle">Join us to get faster checkout and track orders.</p>
    
    <div class="form-row" style="margin-bottom: var(--sp-4);">
      <div class="form-group" style="margin-bottom: 0;">
        <label class="form-label">First Name</label>
        <input type="text" class="form-input" placeholder="First">
      </div>
      <div class="form-group" style="margin-bottom: 0;">
        <label class="form-label">Last Name</label>
        <input type="text" class="form-input" placeholder="Last">
      </div>
    </div>

    <div class="form-group">
      <label class="form-label">Email Address</label>
      <input type="email" class="form-input" placeholder="you@example.com">
    </div>
    
    <div class="form-group">
      <label class="form-label">Password</label>
      <input type="password" class="form-input" placeholder="••••••••">
      <span class="form-hint">Must be at least 8 characters long.</span>
    </div>
    
    <button class="btn btn--primary btn--full btn--lg" style="margin-top: var(--sp-4);" onclick="window.location.href='/pages/auth/verify-otp.html'">Create Account</button>
    
    <div class="auth-footer">
      Already have an account? <a href="/pages/auth/login.html">Log In</a>
    </div>
  </div>
</section>
{{/base}}
