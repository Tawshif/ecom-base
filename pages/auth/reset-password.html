{{#> base title="Create New Password" }}
<section class="auth-layout">
  <div class="auth-card">
    <h1 class="auth-card__title">New Password</h1>
    <p class="auth-card__subtitle">Please enter a new password for your account.</p>
    
    <div class="form-group">
      <label class="form-label">New Password</label>
      <input type="password" class="form-input" placeholder="••••••••">
    </div>
    
    <div class="form-group">
      <label class="form-label">Confirm New Password</label>
      <input type="password" class="form-input" placeholder="••••••••">
    </div>
    
    <button class="btn btn--primary btn--full btn--lg" style="margin-top: var(--sp-4);" onclick="toast('Password successfully reset!','success'); setTimeout(() => window.location.href='/pages/auth/login.html', 1500)">Reset Password</button>
  </div>
</section>
{{/base}}
