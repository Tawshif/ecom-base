<!-- ============================================================
     HEADER — Commercia Retail Style (2-Row Sticky)
     ============================================================ -->
<header class="header">
  <!-- Row 1: Logo + Search + Utilities -->
  <div class="header__top">
    <div class="container">
      <div class="header__top-inner">
        <a href="/" class="header__logo">Brand<span>.</span></a>

        <div class="header__search">
          <span class="header__search-icon">🔍</span>
          <input type="text" placeholder="Search for groceries, essentials & more…" aria-label="Search">
        </div>

        <div class="header__actions">
          <button class="header__action-btn" title="Account">
            <span class="header__action-icon">👤</span>
            <span class="header__action-label">Account</span>
          </button>
          <button class="header__action-btn" title="Cart" onclick="toggleCart()">
            <span class="header__action-icon">🛒</span>
            <span class="header__action-label">Cart</span>
            <span class="cart-badge">3</span>
          </button>
          <button class="header__action-btn" title="Compare">
            <span class="header__action-icon">⚖️</span>
            <span class="header__action-label">Compare</span>
          </button>
        </div>
      </div>
    </div>
  </div>

  <!-- Row 2: Category Navigation -->
  <div class="header__nav-bar">
    <div class="container">
      <nav class="header__nav">
        <a href="#" class="header__nav-link header__nav-link--all">☰ All Categories</a>
        <a href="#" class="header__nav-link">Fresh Vegetables</a>
        <a href="#" class="header__nav-link">Fruits</a>
        <a href="#" class="header__nav-link">Dairy & Eggs</a>
        <a href="#" class="header__nav-link">Bakery</a>
        <a href="#" class="header__nav-link">Beverages</a>
        <a href="#" class="header__nav-link">Snacks</a>
        <a href="#" class="header__nav-link">Personal Care</a>
        <a href="#" class="header__nav-link">Household</a>
        <a href="#" class="header__nav-link">Pet Supplies</a>
        <a href="#" class="header__nav-link">Health</a>
      </nav>
    </div>
  </div>
</header>
