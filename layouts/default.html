<!--
  DEFAULT LAYOUT
  Extends: layouts/base.html
  Used by: Homepage, Category, PDP, Cart, Blog, Static pages
  Structure: Promo Bar + Header + Mega Menu + [Main Content] + Footer + Overlays

  Usage:
  Copy layouts/base.html as your page starting point, then
  populate the layout slots (#site-header, #main-content, #site-footer, #overlays)
  with the appropriate component includes.
-->

<!--
  #site-header should contain:
    - components/global/promo-bar.html
    - components/global/header.html
    - components/global/mega-menu.html
    - components/global/mobile-nav.html (mobile only)

  #main-content should contain:
    - Page-specific content

  #site-footer should contain:
    - components/global/footer.html

  #overlays should contain:
    - components/global/cart-drawer.html
    - components/global/search-modal.html
    - components/global/cookie-banner.html
-->
